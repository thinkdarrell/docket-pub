[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "docket"
version = "0.1.0"
requires-python = ">=3.10"
# Runtime dependencies are sourced from requirements.lock (the pinned
# tree generated by `uv pip compile requirements.txt -o requirements.lock`).
# This makes `pip install -e .`, `pip install -r requirements.lock`, and
# the Dockerfile resolve to the SAME set — no transitive drift between
# local dev, CI, and prod. Editing requirements.txt is the source-of-
# truth update; the refresh workflow is in CLAUDE.md.
dynamic = ["dependencies"]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.4",
]

[tool.setuptools.dynamic]
dependencies = {file = ["requirements.lock"]}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["live: makes real Anthropic API calls; opt-in via -m live"]

[tool.ruff]
target-version = "py310"
