services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docket
      POSTGRES_PASSWORD: docket_dev
      POSTGRES_DB: docket_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docket -d docket_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_APP: "docket.web:create_app()"
      FLASK_ENV: development
      DATABASE_URL: postgresql://docket:docket_dev@db:5432/docket_db
      SECRET_KEY: dev-secret-change-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
