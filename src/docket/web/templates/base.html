<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}docket.pub{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav>
        <a href="{{ url_for('public.index') }}">docket.pub</a>
        <a href="{{ url_for('public.search') }}">Search</a>
