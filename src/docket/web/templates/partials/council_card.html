{# Council member card — rendered by both city.html and council.html.
   Expects: m (council member dict), municipality (with .slug). #}
{% set hue = (m.id * 137) % 360 %}
<button class="cc" type="button"
        hx-get="{{ url_for('public.rail_member', slug=municipality.slug, member_id=m.id) }}"
        hx-target="#source-rail"
        hx-swap="innerHTML">
    <div class="cc-portrait" style="background: oklch(0.45 0.12 {{ hue }})">
        <svg viewBox="0 0 100 100" class="cc-portrait-bg" aria-hidden="true">
            <defs>
                <pattern id="p{{ m.id }}" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)">
                    <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
                </pattern>
            </defs>
            <rect width="100" height="100" fill="url(#p{{ m.id }})" />
        </svg>
        <div class="cc-initials t-display">{{ m.name.split()[0][0] }}{{ m.name.split()[-1][0] }}</div>
        {% if not m.photo_url %}
        <div class="cc-portrait-tag t-mono">photo · placeholder</div>
        {% endif %}
    </div>
    <div class="cc-body">
        <div class="cc-row1">
            <div class="cc-name">{{ m.name }}</div>
            <div class="cc-district t-mono">{{ m.district_name or 'At-Large' }}</div>
        </div>

        {% if m.attendance_pct is defined and m.attendance_pct is not none %}
          <div class="cc-stats">
            <div class="stat-row">
              <span class="stat-label t-mono">ATTEND.</span>
              <span class="stat-value t-tnum">{{ m.attendance_pct }}%</span>
            </div>
            <div class="stat-bar"><div class="stat-fill" style="width: {{ m.attendance_pct }}%"></div></div>
            {% if m.alignment_pct is defined and m.alignment_pct is not none %}
              <div class="stat-row">
                <span class="stat-label t-mono">ALIGN.</span>
                <span class="stat-value t-tnum">{{ m.alignment_pct }}%</span>
              </div>
              <div class="stat-bar"><div class="stat-fill is-accent" style="width: {{ m.alignment_pct }}%"></div></div>
            {% endif %}
          </div>
        {% endif %}

        <div class="cc-foot t-mono">
            <span>View record →</span>
            <span class="cc-arrow">→</span>
        </div>
    </div>
</button>
