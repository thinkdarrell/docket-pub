{# KPI explainer card. Lives inside the new source_rail (Task 7), one per KPI.
   Args:
     label (str, required)
     value (str, required) — pre-formatted
     sub   (str | None)
#}
<article class="kpi-explainer stat-card-base">
  <div class="kpi-explainer-label t-mono">{{ label }}</div>
  <div class="kpi-explainer-value t-display t-tnum">{{ value }}</div>
  {% if sub %}
    <div class="kpi-explainer-sub t-meta">{{ sub }}</div>
  {% endif %}
</article>
