{% extends "base.html" %}
{% block title %}New note{% endblock %}
{% block content %}
<h1>New note</h1>
<form method="post" action="{{ url_for('admin.coverage_create') }}">
  <input type="hidden" name="kind" value="note">
  <label>Body
    <textarea name="body" rows="4" required placeholder="1-3 sentences of context."></textarea>
  </label>
  <label>Partner credit (optional)
    <input type="text" name="partner_credit" placeholder="in partnership with X">
  </label>
  {% set subjects = [] %}
  {% include "admin/coverage/_subject_picker.html" %}
  <label>
    <input type="checkbox" name="publish_now"> Publish immediately
  </label>
  <button type="submit">Save</button>
  <a href="{{ url_for('admin.coverage_list') }}">Cancel</a>
</form>

<script>
  function addSubjectChip(btn) {
    var ds = btn.dataset;
    var container = document.getElementById('selected-subjects');
    if (!container) return;

    var chip = document.createElement('span');
    chip.className = 'subject-chip';

    var label = document.createTextNode(ds.subjectType + ': ' + ds.subjectLabel + ' ');
    chip.appendChild(label);

    var hidden = document.createElement('input');
    hidden.type = 'hidden';
    hidden.name = 'subject[]';
    hidden.value = ds.subjectType + ':' + ds.subjectId;
    chip.appendChild(hidden);

    var rm = document.createElement('button');
    rm.type = 'button';
    rm.textContent = '✕';
    rm.addEventListener('click', function () { chip.remove(); });
    chip.appendChild(rm);

    container.appendChild(chip);
  }
</script>
{% endblock %}
